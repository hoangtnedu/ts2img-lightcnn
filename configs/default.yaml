project_name: ts2img-lightcnn

dataset:
  names:
    - GunPoint
    - ECG200
    - Coffee
    - FordA
    - Wafer
  image_size: 64

experiment:
  representations:
    - gaf
    - mtf
    - rp
    - stft
  model_type: light2dcnn
  seeds:
    - 42
    - 2024
    - 2026
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  validation_split: 0.2

checkpoint:
  monitor: val_accuracy
  mode: max
  early_stopping_patience: 10
  reduce_lr_patience: 5